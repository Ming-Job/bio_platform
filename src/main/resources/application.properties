# 服务器端口（默认8080，可自定义）
server.port=8080

# ===================== 数据库配置 =====================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/bio_info_edu?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123456

# ===================== MyBatis-Plus 配置 =====================
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl
mybatis-plus.global-config.db-config.id-type=AUTO

# ===================== Spring 环境配置 =====================
spring.profiles.active=dev
spring.mvc.async.request-timeout=300000

# ===================== Knife4j/Swagger 配置 =====================
knife4j.enable=true
knife4j.openapi.title=生物信息学教育平台API文档
knife4j.openapi.description=生物信息学文件上传与管理API
knife4j.openapi.version=1.0.0

# ===================== Jackson日期配置 =====================
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss
spring.jackson.time-zone=GMT+8

# ===================== 生物信息学文件上传配置 =====================
# 基础文件存储目录（建议使用绝对路径）
bio.file.upload.base-dir=D:/bio_uploads/files
# 分片临时目录
bio.file.upload.chunk-temp-dir=D:/bio_uploads/temp

# 基础访问URL（用于构建下载链接）
bio.file.access.base-url=http://localhost:8080/api/files

# Spring文件上传配置（该电脑为轻薄本，运行不了大文件的生物分析）
# 单个文件最大大小（10GB，根据需求调整）
spring.servlet.multipart.max-file-size=10GB
# 单个请求最大大小（20GB，支持同时上传多个文件）
spring.servlet.multipart.max-request-size=20GB
spring.servlet.multipart.enabled=true
# 文件大小阈值，超过将写入临时文件（避免内存溢出）
spring.servlet.multipart.file-size-threshold=10MB
# 临时文件存储位置
spring.servlet.multipart.location=D:/bio_uploads/temp

# 允许上传的文件扩展名（生物信息学常见格式）
bio.file.allowed-extensions=.fastq,.fastq.gz,.fq,.fq.gz,.fasta,.fa,.fasta.gz,.fa.gz,.bam,.sam,.vcf,.bed,.gtf,.txt,.csv,.tsv, .pdb, .sdf,.txt,.qza,.tsv

# 上传配置
upload.path=./uploads
upload.url-prefix=/uploads

# 头像上传配置
avatar.upload-relative-path=uploads/avatar/
avatar.access-prefix=/avatar/

# 课程图片上传
course.cover.upload-relative-path=uploads/course/
course.cover.access-prefix=/course/

# 课程视频上传
course.video.upload-relative-path=uploads/video/
course.video.access-prefix=/video/

# 课程文档上传 (新增)
course.document.upload-relative-path=uploads/document/
course.document.access-prefix=/document/


# ===================== DeepSeek AI 配置 (辅助生信代码生成) =====================
# DeepSeek 的 V3 模型（DeepSeek-V3）
# 强大的旗舰级通用大模型，写代码、做逻辑推理、提取你那些生信关键词
ai.deepseek.api-url=https://api.deepseek.com/chat/completions
ai.deepseek.api-key=sk-efd8f6768eda40dc89a8877cd456ec07
ai.deepseek.model=deepseek-chat

# ===================== Redis 配置 =====================
spring.redis.host=localhost
spring.redis.port=6379
spring.redis.database=0
spring.redis.timeout=3000
spring.redis.lettuce.pool.max-active=8
spring.redis.lettuce.pool.max-idle=8
spring.redis.lettuce.pool.min-idle=0
spring.redis.lettuce.pool.max-wait=-1

# ===================== Docker沙箱 配置 =====================
sandbox.volume.path=D:/docker_share
sandbox.python.container=python-sandbox
sandbox.r.container=r-sandbox